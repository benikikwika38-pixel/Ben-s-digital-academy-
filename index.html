<!DOCTYPE html>
<html>
<head>
<title>ben'sDigital Academy</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
color:#2c3e50;
}

input{
width:90%;
padding:10px;

}

button{
background:#3498db;
color:white;
border:none;
padding:12px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}
</style>
</head>

<body>

<div class="container">

<h1>Béni Digital Academy</h1>

<p>Apprendre l'informatique gratuitement pour débutant</p>

<h2>Formulaire d'inscription</h2>

<form>
<input type="text" placeholder="Votre nom" required><br>
<input type="email" placeholder="Votre email" required><br>
<input type="text" placeholder="Votre ville"><br>

<button type="submit">S'inscrire</button>

</form>

</div>

</body>
</html>
